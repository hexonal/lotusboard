mixed-port: 1080
redir-port: 1087
allow-lan: true
mode: Rule
log-level: info
external-controller: 127.0.0.1:1089
global-client-fingerprint: firefox
ipv6: false
sniffer:
  enable: true
  override-destination: true
  sniffing:
    - tls
    - http
dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: false
  listen: 0.0.0.0:1053
  ipv6: false
  # VPN 模式：统一使用国内 DNS，避免 ISP DNS 不稳定
  default-nameserver:
    - 223.5.5.5        # 阿里 DNS
    - 119.29.29.29     # 腾讯 DNS
  enhanced-mode: redir-host
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "localhost.ptlogin2.qq.com"
    - "dns.alidns.com"
    - "doh.pub"

  # 国内应用域名强制使用国内 DNS（解决飞书等企业应用无法访问的问题）
  # Stash 兼容格式：单个 DNS 服务器，使用单引号
  nameserver-policy:
    # 飞书
    '+.feishu.cn': 223.5.5.5
    '+.feishu.net': 223.5.5.5
    '+.feishucdn.com': 223.5.5.5
    '+.larksuite.com': 223.5.5.5
    # 钉钉
    '+.dingtalk.com': 223.5.5.5
    '+.dingtalk.net': 223.5.5.5
    # 企业微信
    '+.work.weixin.qq.com': 223.5.5.5
    '+.wxwork.com.cn': 223.5.5.5
    # 微信、QQ、腾讯系
    '+.qq.com': 223.5.5.5
    '+.tencent.com': 223.5.5.5
    '+.weixin.com': 223.5.5.5
    '+.wechat.com': 223.5.5.5
    '+.servicewechat.com': 223.5.5.5
    # 阿里系
    '+.alipay.com': 223.5.5.5
    '+.taobao.com': 223.5.5.5
    '+.aliyun.com': 223.5.5.5
    # 百度、字节跳动、网易
    '+.baidu.com': 223.5.5.5
    '+.bytedance.com': 223.5.5.5
    '+.163.com': 223.5.5.5
    # 其他主流国内服务
    '+.jd.com': 223.5.5.5
    '+.bilibili.com': 223.5.5.5
    '+.zhihu.com': 223.5.5.5
    # 代理服务器 / 订阅基础设施域名
    'us.996icu.wiki': 223.5.5.5
    'us2.996icu.wiki': 223.5.5.5
    'us3.996icu.wiki': 223.5.5.5
    'ddns.996icu.wiki': 223.5.5.5
    'guanxingyun.996icu.wiki': 223.5.5.5
    'claw.996icu.wiki': 223.5.5.5
    '52.996icu.wiki': 223.5.5.5
    'v2.996icu.wiki': 223.5.5.5
    'v2-proxy.996icu.wiki': 223.5.5.5
    '+.996icu.wiki': 'tls://1.1.1.1'

  # 主 DNS - VPN 模式统一使用国内 DNS
  nameserver:
    - 223.5.5.5        # 阿里 DNS
    - 119.29.29.29     # 腾讯 DNS
    - 114.114.114.114  # 114 DNS
  # Fallback - 仅用于被污染域名
  fallback:
    - tls://8.8.8.8
    - tls://1.1.1.1
  # 代理服务器域名解析
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 直连域名解析
  direct-nameserver:
    - system
  direct-nameserver-follow-policy: true

  # Fallback 过滤 - 严格触发条件（仅 GFW 列表，避免国内域名误触发）
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
      # 移除 geolocation-!cn 避免国内域名误触发 fallback
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - "+.google.com"
      - "+.googleapis.com"
      - "+.gstatic.com"         # Google 静态资源 (JS/CSS)
      - "+.googleusercontent.com"  # Google 用户内容
      - "+.ggpht.com"           # Google 图片托管
      - "+.doubleclick.net"     # Google 广告/认证（关键！）
      - "+.youtube.com"
      - "+.facebook.com"
      - "+.twitter.com"
      - "+.github.com"
